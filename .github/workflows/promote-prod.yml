name: Promote to Production

on:
  schedule:
    - cron: '0 1 * * *'  # 1am UTC nightly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GH_PAT required: GITHUB_TOKEN cannot trigger downstream tag-push workflows.
          # Create a classic PAT with `repo` scope and add it as secret GH_PAT.
          token: ${{ secrets.GH_PAT }}

      - name: Check for new commits since last tag
        id: check
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags — will create v0.1.0"
            echo "should_promote=true" >> "$GITHUB_OUTPUT"
            echo "new_tag=v0.1.0" >> "$GITHUB_OUTPUT"
          else
            COMMITS=$(git rev-list "${LATEST_TAG}..HEAD" --count)
            echo "Commits since $LATEST_TAG: $COMMITS"
            if [ "$COMMITS" -eq 0 ]; then
              echo "Nothing new since $LATEST_TAG — skipping."
              echo "should_promote=false" >> "$GITHUB_OUTPUT"
            else
              VERSION="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
              NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
              echo "should_promote=true" >> "$GITHUB_OUTPUT"
              echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create and push version tag
        if: steps.check.outputs.should_promote == 'true'
        env:
          NEW_TAG: ${{ steps.check.outputs.new_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Pushed $NEW_TAG — prod deployment triggered."
